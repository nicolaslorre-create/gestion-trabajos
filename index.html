<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Trabajos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F3F2EF;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1A1A18;
    --text2: #6B6B67;
    --text3: #A8A8A4;
    --orange: #E8711A;
    --orange-light: #FFF2E8;
    --orange-text: #8B3F00;
    --green: #6AA84F;
    --green-light: #F0F7EA;
    --green-text: #2D5A1B;
    --cerr-s: #E69138;
    --cerr-s-light: #FEF6EE;
    --cerr-s-text: #7A3D00;
    --cerr-n: #1155CC;
    --cerr-n-light: #EEF3FB;
    --cerr-n-text: #0C3D8A;
    --radius: 8px;
    --radius-lg: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* TOPBAR */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px;
  }
  .brand-name { font-size: 16px; font-weight: 600; letter-spacing: -0.4px; }
  .brand-badge {
    font-size: 10px; padding: 2px 7px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text3); font-weight: 500;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .user-chip {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px 5px 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; font-size: 13px; color: var(--text2); cursor: pointer;
  }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: #185FA5; color: #B5D4F4;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
  }
  .topbar-btn {
    width: 34px; height: 34px; border-radius: var(--radius);
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); cursor: pointer; font-size: 16px;
    transition: background 0.15s;
  }
  .topbar-btn:hover { background: #EBEBEB; }

  /* MAIN */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.s-orange::before { background: var(--orange); }
  .stat-card.s-green::before { background: var(--green); }
  .stat-card.s-cerr-s::before { background: var(--cerr-s); }
  .stat-card.s-cerr-n::before { background: var(--cerr-n); }
  .stat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 6px; }
  .stat-num { font-size: 28px; font-weight: 600; letter-spacing: -1px; }
  .stat-card.s-orange .stat-num { color: var(--orange-text); }
  .stat-card.s-green .stat-num { color: var(--green-text); }
  .stat-card.s-cerr-s .stat-num { color: var(--cerr-s-text); }
  .stat-card.s-cerr-n .stat-num { color: var(--cerr-n); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* TOOLBAR */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap input {
    padding: 8px 12px 8px 34px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text);
    width: 220px; outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--orange); }
  .search-wrap .si {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px; color: var(--text3);
  }
  .filt-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--text2); cursor: pointer;
    transition: all 0.15s;
  }
  .filt-btn:hover { background: var(--surface2); }
  .filt-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .btn-new {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    background: var(--orange); border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #fff; cursor: pointer;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn-new:hover { background: #D4611A; }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th {
    padding: 10px 14px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text3);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  th:nth-child(1) { width: 36px; }
  th:nth-child(2) { width: 58px; }
  th:nth-child(3) { width: 78px; }
  th:nth-child(4) { width: auto; }
  th:nth-child(5) { width: 130px; }
  th:nth-child(6) { width: 95px; }
  th:nth-child(7) { width: 90px; }
  th:nth-child(8) { width: 90px; }
  th:nth-child(9) { width: 50px; }
  tbody td {
    padding: 9px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }

  /* SECTION HEADERS */
  .sec-row td {
    padding: 7px 14px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.7px;
    border-bottom: 1px solid var(--border);
  }
  .sec-pend td { background: #FFF8F4; color: var(--orange-text); }
  .sec-comp td { background: #F3F9EE; color: var(--green-text); }
  .sec-cerrs td { background: #FEF9F2; color: var(--cerr-s-text); }
  .sec-cerrn td { background: #EEF3FB; color: var(--cerr-n-text); }

  /* DATA ROWS */
  .row-pend td { background: #FFFCFA; }
  .row-pend:hover td { background: var(--orange-light); }
  .row-comp td { background: #FAFDF7; color: var(--green-text); }
  .row-comp:hover td { background: var(--green-light); }
  .row-cerrs td { background: #FDFAF6; color: var(--cerr-s-text); }
  .row-cerrs:hover td { background: var(--cerr-s-light); }
  .row-cerrn td { background: #F8FAFD; color: var(--cerr-n-text); }
  .row-cerrn:hover td { background: var(--cerr-n-light); }

  /* CHECKBOX */
  .chk {
    width: 15px; height: 15px; border-radius: 4px;
    border: 1.5px solid #CCC;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; cursor: pointer;
  }
  .chk-comp { background: var(--green); border-color: var(--green); color: #fff; }
  .chk-cerrs { background: var(--cerr-s); border-color: var(--cerr-s); color: #fff; }
  .chk-cerrn { background: var(--cerr-n); border-color: var(--cerr-n); color: #fff; }

  /* PILLS */
  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.2px;
  }
  .pill-pend { background: #FFE8D5; color: var(--orange-text); }
  .pill-comp { background: #D5EEC5; color: var(--green-text); }
  .pill-cerr { background: #FDEBD5; color: var(--cerr-s-text); }

  /* SALDO */
  .saldo-pos { color: var(--cerr-s-text); font-weight: 600; }
  .saldo-zero { color: var(--text3); }

  /* MONO */
  .mono { font-family: 'DM Mono', monospace; font-size: 11px; }

  /* ACTIONS */
  .act-btn {
    width: 26px; height: 26px; border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text2); cursor: pointer;
    transition: background 0.12s;
  }
  .act-btn:hover { background: var(--surface2); }

  /* SEC DOT */
  .sec-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }
  .dot-pend { background: var(--orange); }
  .dot-comp { background: var(--green); }
  .dot-cerrs { background: var(--cerr-s); }
  .dot-cerrn { background: var(--cerr-n); }
  .sec-count {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 10px;
    font-size: 10px; margin-left: 8px;
  }
  .cnt-pend { background: #FFE0C0; color: var(--orange-text); }
  .cnt-comp { background: #CCEBB0; color: var(--green-text); }
  .cnt-cerrs { background: #FFDCAA; color: var(--cerr-s-text); }
  .cnt-cerrn { background: #C8D9F5; color: var(--cerr-n); }

  /* EMPTY */
  .row-empty td { text-align: center; padding: 28px; color: var(--text3); font-size: 13px; }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 28px;
    width: 500px; max-width: 95vw;
    transform: translateY(12px);
    transition: transform 0.2s;
    max-height: 90vh; overflow-y: auto;
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text2); cursor: pointer;
  }
  .modal-close:hover { background: var(--surface2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1 / -1; }
  .form-group label {
    display: block; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    color: var(--text3); margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text);
    background: var(--surface); outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--orange); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
  .btn-cancel {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; color: var(--text2); cursor: pointer;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 8px 18px;
    background: var(--orange); border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #fff; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #D4611A; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1A1A18; color: #fff;
    padding: 10px 16px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    z-index: 300; opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast i { color: #6AA84F; }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .main { padding: 14px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .search-wrap input { width: 150px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-bolt"></i></div>
    <span class="brand-name">Gestión de Trabajos</span>
    <span class="brand-badge">demo</span>
  </div>
  <div class="topbar-right">
    <div class="topbar-btn" title="Notificaciones"><i class="ti ti-bell"></i></div>
    <div class="user-chip">
      <div class="avatar">AD</div>
      Administrador
      <i class="ti ti-chevron-down" style="font-size:12px"></i>
    </div>
  </div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat-card s-orange">
      <div class="stat-label">Pendientes</div>
      <div class="stat-num" id="cnt-p">0</div>
      <div class="stat-sub">en proceso</div>
    </div>
    <div class="stat-card s-green">
      <div class="stat-label">Completados</div>
      <div class="stat-num" id="cnt-c">0</div>
      <div class="stat-sub">listos para retirar</div>
    </div>
    <div class="stat-card s-cerr-s">
      <div class="stat-label">Cerrados c/saldo</div>
      <div class="stat-num" id="cnt-cs">0</div>
      <div class="stat-sub">pago pendiente</div>
    </div>
    <div class="stat-card s-cerr-n">
      <div class="stat-label">Cerrados s/saldo</div>
      <div class="stat-num" id="cnt-cn">0</div>
      <div class="stat-sub">totalmente cobrados</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <i class="ti ti-search si"></i>
        <input type="text" id="srch" placeholder="Buscar cliente, trabajo, ID..." oninput="render()">
      </div>
      <button class="filt-btn active" id="fb-all" onclick="setF('all',this)"><i class="ti ti-list" style="font-size:13px"></i> Todos</button>
      <button class="filt-btn" id="fb-p" onclick="setF('Pendiente',this)"><i class="ti ti-clock" style="font-size:13px"></i> Pendientes</button>
      <button class="filt-btn" id="fb-c" onclick="setF('Completado',this)"><i class="ti ti-check" style="font-size:13px"></i> Completados</button>
      <button class="filt-btn" id="fb-cerr" onclick="setF('Cerrado',this)"><i class="ti ti-archive" style="font-size:13px"></i> Cerrados</button>
    </div>
    <button class="btn-new" onclick="openModal()"><i class="ti ti-plus"></i> Nueva Tarea</button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th></th>
          <th>ID</th>
          <th>Fecha</th>
          <th>Descripción</th>
          <th>Cliente</th>
          <th>Total</th>
          <th>Saldo</th>
          <th>Estado</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL NUEVA TAREA -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title"><i class="ti ti-plus" style="color:var(--orange);margin-right:6px"></i>Nueva Tarea</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Descripción del trabajo</label>
        <input type="text" id="f-desc" placeholder="Placas, grabado, vinilo, stencil...">
      </div>
      <div class="form-group">
        <label>Cliente</label>
        <input type="text" id="f-cli" placeholder="Nombre del cliente">
      </div>
      <div class="form-group">
        <label>Teléfono / Contacto</label>
        <input type="text" id="f-tel" placeholder="291 ...">
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="f-qty" value="1" min="1" oninput="calcTotal()">
      </div>
      <div class="form-group">
        <label>Precio Unitario</label>
        <input type="number" id="f-precio" placeholder="0" oninput="calcTotal()">
      </div>
      <div class="form-group">
        <label>Seña</label>
        <input type="number" id="f-sena" placeholder="0" oninput="calcTotal()">
      </div>
      <div class="form-group">
        <label>Medio de Pago</label>
        <select id="f-pago">
          <option>Efectivo</option>
          <option>Transferencia</option>
          <option>Tarjeta de Crédito</option>
          <option>Tarjeta de Débito</option>
        </select>
      </div>
      <div class="form-group">
        <label>Material</label>
        <input type="text" id="f-mat" placeholder="Acrílico, madera, vinilo...">
      </div>
      <div class="form-group">
        <label>Medidas</label>
        <input type="text" id="f-med" placeholder="Ej: 30x20 cm">
      </div>
      <div class="form-group">
        <label>CUIT</label>
        <input type="text" id="f-cuit" placeholder="20-XXXXXXXX-X">
      </div>
      <div class="form-group form-full" style="background:var(--surface2);border-radius:var(--radius);padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text3);margin-bottom:3px">Total</div>
          <div id="f-total" style="font-size:18px;font-weight:600;color:var(--text)">$0</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text3);margin-bottom:3px">Saldo</div>
          <div id="f-saldo" style="font-size:18px;font-weight:600;color:var(--cerr-s-text)">$0</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarTarea()"><i class="ti ti-check"></i> Guardar Tarea</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-circle-check"></i> <span id="toast-msg"></span></div>

<script>
  let tareas = [
    {id:'00023',fecha:'15/05/2026',desc:'Placas de Identificación',cliente:'Municipalidad',tel:'291 401-0000',total:45000,sena:0,saldo:45000,estado:'Pendiente',pago:'Transferencia'},
    {id:'00024',fecha:'16/05/2026',desc:'Grabado Trofeos x12',cliente:'Club Atlético',tel:'291 450-1234',total:28000,sena:0,saldo:28000,estado:'Pendiente',pago:'Efectivo'},
    {id:'00025',fecha:'17/05/2026',desc:'Vinilo Cartel Local',cliente:'Pizzería Roma',tel:'291 476-5555',total:15000,sena:7500,saldo:7500,estado:'Pendiente',pago:'Efectivo'},
    {id:'00021',fecha:'13/05/2026',desc:'Stencil Industrial',cliente:'Metalúrgica Sur',tel:'291 444-2020',total:32000,sena:0,saldo:32000,estado:'Completado',pago:'Transferencia'},
    {id:'00022',fecha:'14/05/2026',desc:'Acrílico Decorativo',cliente:'Arq. Fernández',tel:'291 461-8888',total:18500,sena:0,saldo:18500,estado:'Completado',pago:'Tarjeta de Crédito'},
    {id:'00019',fecha:'10/05/2026',desc:'Placas CABA x50',cliente:'Gobierno Pcia.',tel:'291 459-9900',total:120000,sena:60000,saldo:60000,estado:'Cerrado',pago:'Transferencia'},
    {id:'00020',fecha:'12/05/2026',desc:'Grabado Regalos Empresariales',cliente:'Lopez Hermanos',tel:'291 490-3344',total:22000,sena:17000,saldo:5000,estado:'Cerrado',pago:'Efectivo'},
    {id:'00018',fecha:'08/05/2026',desc:'Corte Acrílico x20',cliente:'Distribuidora BBA',tel:'291 480-7777',total:38000,sena:38000,saldo:0,estado:'Cerrado',pago:'Transferencia'},
  ];

  let nextId = 26;
  let filtro = 'all';

  function fmt(n){ return '$' + Math.round(n).toLocaleString('es-AR'); }

  function setF(f, btn) {
    filtro = f;
    document.querySelectorAll('.filt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function calcTotal() {
    const qty = parseFloat(document.getElementById('f-qty').value) || 0;
    const precio = parseFloat(document.getElementById('f-precio').value) || 0;
    const sena = parseFloat(document.getElementById('f-sena').value) || 0;
    const total = qty * precio;
    const saldo = total - sena;
    document.getElementById('f-total').textContent = fmt(total);
    document.getElementById('f-saldo').textContent = fmt(Math.max(saldo, 0));
    document.getElementById('f-saldo').style.color = saldo > 0 ? 'var(--cerr-s-text)' : 'var(--green-text)';
  }

  function render() {
    const q = document.getElementById('srch').value.toLowerCase();
    const body = document.getElementById('tbody');
    let html = '';

    const grupos = [
      { key: 'pend',  label: 'Pendientes',                  filter: t => t.estado === 'Pendiente',             secCls: 'sec-pend',  dotCls: 'dot-pend',  cntCls: 'cnt-pend',  rowCls: 'row-pend',  chkCls: '',            pillCls: 'pill-pend', pillTxt: 'Pendiente' },
      { key: 'comp',  label: 'Completados — listos para retirar', filter: t => t.estado === 'Completado',       secCls: 'sec-comp',  dotCls: 'dot-comp',  cntCls: 'cnt-comp',  rowCls: 'row-comp',  chkCls: 'chk-comp',    pillCls: 'pill-comp', pillTxt: 'Completado' },
      { key: 'cerrs', label: 'Cerrados — saldo pendiente',  filter: t => t.estado === 'Cerrado' && t.saldo > 0, secCls: 'sec-cerrs', dotCls: 'dot-cerrs', cntCls: 'cnt-cerrs', rowCls: 'row-cerrs', chkCls: 'chk-cerrs',   pillCls: 'pill-cerr', pillTxt: 'Cerrado' },
      { key: 'cerrn', label: 'Cerrados — cobrados',         filter: t => t.estado === 'Cerrado' && t.saldo === 0,secCls: 'sec-cerrn', dotCls: 'dot-cerrn', cntCls: 'cnt-cerrn', rowCls: 'row-cerrn', chkCls: 'chk-cerrn',   pillCls: 'pill-comp', pillTxt: 'Cerrado' },
    ];

    grupos.forEach(g => {
      let rows = tareas.filter(t => {
        const matchEstado = filtro === 'all' || (filtro === 'Cerrado' && t.estado === 'Cerrado') || t.estado === filtro;
        const matchGrupo = g.filter(t);
        const matchQ = !q || t.cliente.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.id.includes(q);
        return matchEstado && matchGrupo && matchQ;
      });

      if (!rows.length) return;

      html += `<tr class="sec-row ${g.secCls}"><td colspan="9"><span class="sec-dot ${g.dotCls}"></span>${g.label}<span class="sec-count ${g.cntCls}">${rows.length}</span></td></tr>`;

      rows.forEach(t => {
        const chk = g.chkCls ? `<div class="chk ${g.chkCls}"><i class="ti ti-check" style="font-size:8px"></i></div>` : `<div class="chk"></div>`;
        const saldoHtml = t.saldo > 0 ? `<span class="saldo-pos">${fmt(t.saldo)}</span>` : `<span class="saldo-zero">—</span>`;
        html += `<tr class="${g.rowCls}">
          <td>${chk}</td>
          <td class="mono">${t.id}</td>
          <td style="color:var(--text3);font-size:12px">${t.fecha.slice(0,5)}</td>
          <td title="${t.desc}">${t.desc}</td>
          <td title="${t.cliente}">${t.cliente}</td>
          <td style="font-weight:500">${fmt(t.total)}</td>
          <td>${saldoHtml}</td>
          <td><span class="pill ${g.pillCls}">${g.pillTxt}</span></td>
          <td><button class="act-btn" title="Opciones"><i class="ti ti-dots-vertical"></i></button></td>
        </tr>`;
      });
    });

    if (!html) {
      html = `<tr class="row-empty"><td colspan="9"><i class="ti ti-search" style="font-size:20px;display:block;margin:0 auto 8px;color:var(--text3)"></i>No hay tareas que coincidan</td></tr>`;
    }

    body.innerHTML = html;

    document.getElementById('cnt-p').textContent = tareas.filter(t => t.estado === 'Pendiente').length;
    document.getElementById('cnt-c').textContent = tareas.filter(t => t.estado === 'Completado').length;
    document.getElementById('cnt-cs').textContent = tareas.filter(t => t.estado === 'Cerrado' && t.saldo > 0).length;
    document.getElementById('cnt-cn').textContent = tareas.filter(t => t.estado === 'Cerrado' && t.saldo === 0).length;
  }

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('f-desc').focus();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    ['f-desc','f-cli','f-tel','f-qty','f-precio','f-sena','f-mat','f-med','f-cuit'].forEach(id => {
      const el = document.getElementById(id);
      if(el) { el.value = id === 'f-qty' ? '1' : ''; }
    });
    document.getElementById('f-total').textContent = '$0';
    document.getElementById('f-saldo').textContent = '$0';
  }

  function guardarTarea() {
    const desc = document.getElementById('f-desc').value.trim();
    const cli = document.getElementById('f-cli').value.trim();
    if (!desc || !cli) {
      showToast('⚠ Completá al menos la descripción y el cliente', true);
      return;
    }
    const qty = parseFloat(document.getElementById('f-qty').value) || 1;
    const precio = parseFloat(document.getElementById('f-precio').value) || 0;
    const sena = parseFloat(document.getElementById('f-sena').value) || 0;
    const total = qty * precio;
    const saldo = total - sena;
    const hoy = new Date();
    const fecha = `${String(hoy.getDate()).padStart(2,'0')}/${String(hoy.getMonth()+1).padStart(2,'0')}/${hoy.getFullYear()}`;
    tareas.unshift({
      id: String(nextId++).padStart(5,'0'),
      fecha, desc, cliente: cli,
      tel: document.getElementById('f-tel').value,
      total, sena, saldo,
      estado: 'Pendiente',
      pago: document.getElementById('f-pago').value
    });
    closeModal();
    setF('all', document.getElementById('fb-all'));
    showToast('Tarea creada correctamente');
  }

  function showToast(msg, warn) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.querySelector('i').style.color = warn ? '#E69138' : '#6AA84F';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  render();
</script>
</body>
</html>
